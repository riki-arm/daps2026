<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAPS 2026</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #1f2d3d;
    --accent: #4f46e5;
    --success: #16a34a;
    --error: #dc2626;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #e0e7ff, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* HEADER */
.header {
    padding: 25px;
    text-align: center;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
}

/* LOGIN */
.login-box {
    padding: 30px;
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 600;
}

/* CAMERA */
.camera-container {
    background: black;
    position: relative;
}

#reader {
    width: 100%;
}

/* SCAN LINE */
.scan-line {
    height: 2px;
    background: red;
    position: absolute;
    width: 100%;
    animation: scan 2s linear infinite;
}

@keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
}

/* STATUS */
.footer {
    padding: 20px;
    text-align: center;
}

/* NOTIFICATION */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #16a34a;
    color: white;
    padding: 15px 20px;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(-20px);
    transition: 0.4s;
    font-weight: 500;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<!-- 🔔 NOTIF -->
<div id="toast" class="toast"></div>

<!-- 🔐 LOGIN -->
<div id="login-card" class="card">
    <div class="header">
        <h2>DAPS 2026</h2>
    </div>

    <div class="login-box">
        <input type="text" id="kode" placeholder="Masukkan Kode Akses">
        <button onclick="login()">Masuk</button>
        <p id="login-status"></p>
    </div>
</div>

<!-- 📷 APP -->
<div id="app-card" class="card" style="display:none;">
    <div class="header">
        <h2>DAPS 2026</h2>
    </div>

    <div class="camera-container">
        <div id="reader"></div>
        <div class="scan-line"></div>
    </div>

    <div class="footer">
        <div id="status-text">Siap memindai...</div>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxdol6Bk2Ciq4f-VHA5igfuE4QroqAXfNUG5l255v85gkLcp5Hg8VgwyXPbvS35RrVnvQ/exec";

let isScanning = true;

// 🔊 BEEP SOUND
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// 🔔 TOAST
function showToast(text) {
    const toast = document.getElementById("toast");
    toast.innerText = text;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

// LOGIN
function login() {
    const kode = document.getElementById("kode").value;
    const status = document.getElementById("login-status");

    status.innerText = "Memeriksa...";

    fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "login", kode: kode })
    })
    .then(res => res.json())
    .then(data => {
        if (data.valid) {
            status.innerText = "Akses diterima";
            status.style.color = "green";

            setTimeout(() => {
                document.getElementById("login-card").style.display = "none";
                document.getElementById("app-card").style.display = "block";
                startScanner();
            }, 500);
        } else {
            status.innerText = "Akses ditolak!";
            status.style.color = "red";
        }
    });
}

// SCANNER
function startScanner() {
    const statusText = document.getElementById("status-text");

    function onScanSuccess(decodedText) {
        if (!isScanning) return;

        isScanning = false;
        statusText.innerText = "Memproses: " + decodedText;

        fetch(WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type: "scan", nama: decodedText })
        })
        .then(res => res.json())
        .then(() => {

            // 🔊 BEEP
            beep.play();

            // 🔔 NOTIF
            showToast("✔ Berhasil: " + decodedText);

            statusText.innerText = "Berhasil disimpan";
            statusText.style.color = "green";

            setTimeout(() => {
                statusText.innerText = "Siap memindai...";
                statusText.style.color = "#64748b";
                isScanning = true;
            }, 1500);
        })
        .catch(() => {
            statusText.innerText = "Gagal!";
            statusText.style.color = "red";
            setTimeout(() => { isScanning = true; }, 2000);
        });
    }

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 20, qrbox: 250 },
        onScanSuccess
    );
}
</script>

</body>
</html>
