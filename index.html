<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DAPS 2026 by RARM</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --emerald: #064e3b; --gold: #b45309; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; padding: 20px 0; text-align: center; background: var(--emerald); border-bottom: 4px solid #fbbf24; color: white; }
    #reader { width: 92%; max-width: 400px; border-radius: 20px; overflow: hidden; margin-top: 15px; border: 4px solid white; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    #res { width: 88%; max-width: 360px; margin-top: 15px; padding: 20px; border-radius: 25px; background: white; text-align: center; border: 2px solid #e2e8f0; transition: 0.2s; }
    #nm { font-size: 1.4rem; font-weight: 800; margin: 8px 0; line-height: 1.2; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; margin-bottom: 8px; background: #f1f5f9; color: #64748b; text-transform: uppercase; }
    .poin { display: inline-block; padding: 6px 14px; border-radius: 12px; background: var(--emerald); color: white; font-weight: 800; margin-top: 10px; font-size: 0.9rem; }
    .success { border-color: #10b981 !important; background: #f0fdf4 !important; }
    .warning { border-color: #f59e0b !important; background: #fffbeb !important; }
    .error { border-color: #ef4444 !important; background: #fef2f2 !important; }
  </style>
</head>
<body>

  <div class="header">
    <div style="font-size: 0.6rem; font-weight: 800; letter-spacing: 2px; opacity: 0.8;">DAPS 2026</div>
    <div style="font-size: 1.3rem; font-weight: 800;">by RARM</div>
  </div>

  <div id="reader"></div>
  
  <div id="res">
    <div id="st" class="badge">SIAP PINDAI</div>
    <div id="nm">Menunggu Scan...</div>
    <div id="sub" style="font-size: 0.8rem; color: #64748b;">Arahkan kamera ke QR Code</div>
    <div id="pn" class="poin" style="display:none"></div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz2ZhkALonLoROw4Cp2wQ7aTk-iGcwqIrjIfxhtyJk_-jRcLt4kPMPIjacBT0_i-yNK/exec"; 
    let isProcessing = false;

    function onScanSuccess(id) {
      if (isProcessing) return;
      isProcessing = true;

      // Feedback Instan
      if (navigator.vibrate) navigator.vibrate(60);
      document.getElementById('st').innerText = "MEMPROSES...";
      document.getElementById('st').style.color = "#2563eb";

      fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ id: id }) })
      .then(r => r.json())
      .then(res => {
        const card = document.getElementById('res');
        const pn = document.getElementById('pn');
        
        card.className = res.status.toLowerCase();
        document.getElementById('st').innerText = res.title;
        document.getElementById('st').style.color = res.theme || "#64748b";
        document.getElementById('nm').innerText = res.nama || "ID: " + id;
        document.getElementById('sub').innerText = res.sub;
        
        if(res.poin) {
          pn.style.display = "inline-block";
          pn.innerText = res.poin + " POIN";
          pn.style.background = res.theme;
        }

        // JEDA SANGAT SINGKAT (1 Detik)
        setTimeout(() => {
          isProcessing = false;
          card.className = "";
          pn.style.display = "none";
          document.getElementById('st').innerText = "SIAP PINDAI";
          document.getElementById('st').style.color = "#64748b";
        }, 1200); 
      })
      .catch(err => {
        isProcessing = false;
        document.getElementById('st').innerText = "KONEKSI ERROR";
        setTimeout(() => isProcessing = false, 2000);
      });
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" }, 
      { fps: 30, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 }, 
      onScanSuccess
    );
  </script>
</body>
</html>
