<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DAPS 2026 PRO</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; padding: 20px 0; text-align: center; background: #064e3b; color: #fbbf24; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #reader { width: 90%; max-width: 400px; border-radius: 20px; overflow: hidden; margin-top: 20px; border: 4px solid white; }
    #res { width: 85%; max-width: 350px; margin-top: 20px; padding: 25px; border-radius: 25px; background: white; text-align: center; border: 2px solid #e2e8f0; transition: 0.3s; }
    #nm { font-size: 1.5rem; font-weight: 800; margin: 10px 0; }
    .poin-badge { display: inline-block; padding: 5px 15px; border-radius: 50px; background: #064e3b; color: white; font-weight: 800; font-size: 0.8rem; margin-top: 10px; }
    .status-msg { font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div class="header">
    <div style="font-size: 0.7rem; font-weight: 800; opacity: 0.8;">OFFICIAL ATTENDANCE</div>
    <div style="font-size: 1.2rem; font-weight: 800;">DAPS 2026</div>
  </div>

  <div id="reader"></div>
  
  <div id="res">
    <div id="st" class="status-msg">SIAP PINDAI</div>
    <div id="nm">-</div>
    <div id="sub" style="font-size: 0.8rem; opacity: 0.7;">Silakan scan QR Code Anda</div>
    <div id="poin" class="poin-badge" style="display:none;"></div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz2ZhkALonLoROw4Cp2wQ7aTk-iGcwqIrjIfxhtyJk_-jRcLt4kPMPIjacBT0_i-yNK/exec"; 
    let isProcessing = false;

    function onScanSuccess(id) {
      if (isProcessing) return;
      isProcessing = true;
      document.getElementById('st').innerText = "MENGECEK JADWAL...";
      
      fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ id: id }) })
      .then(r => r.json())
      .then(res => {
        const card = document.getElementById('res');
        const poin = document.getElementById('poin');
        
        card.style.borderColor = res.theme || "#e2e8f0";
        document.getElementById('st').innerText = res.title;
        document.getElementById('st').style.color = res.theme || "#64748b";
        document.getElementById('nm').innerText = res.nama || "-";
        document.getElementById('sub').innerText = res.sub || "-";
        
        if(res.poin) {
          poin.style.display = "inline-block";
          poin.innerText = res.poin + " POIN";
          poin.style.background = res.theme;
        }

        setTimeout(() => {
          isProcessing = false;
          card.style.borderColor = "#e2e8f0";
          poin.style.display = "none";
          document.getElementById('st').innerText = "SIAP PINDAI";
          document.getElementById('st').style.color = "#64748b";
        }, 4000);
      });
    }

    new Html5Qrcode("reader").start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
  </script>
</body>
</html>
